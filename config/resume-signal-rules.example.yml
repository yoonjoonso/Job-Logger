# Resume Profile Signal Rules
# Copy to config/resume-signal-rules.yml and customize.
# This file is gitignored — it stays local to each user.
#
# WHAT THIS DOES:
#   These rules control which resume summary profile gets selected for a given role.
#   Each rule adds/subtracts a weight score from a profile based on a detected signal.
#   The profile with the highest total score wins.
#
#   The primary rule for each archetype (archetype_<key> >= 1 → score 70) is
#   auto-generated by sync_profile_archetypes.py from your profile.yml archetypes.
#   Add secondary/cross-archetype rules and penalties here to fine-tune selection.
#
# HOW TO GENERATE YOUR OWN:
#   Ask your AI agent (Claude, Codex, etc.):
#
#     "Read config/profile.yml and config/resume-signal-rules.example.yml.
#      Generate a resume-signal-rules.yml for my archetypes using the operators
#      and actions shown in the example. Add secondary JD-signal boosts, cross-
#      archetype overlaps, fit-band preferences, and low-match penalties based on
#      my target roles."
#
# FIELD REFERENCE:
#   profile_key       — matches a profile_key in resume_profiles (your archetype keys)
#   signal_key        — the signal name (see below for common built-in signals)
#   operator          — gte | lte | eq | present | absent
#   threshold_numeric — numeric threshold for gte/lte/eq (omit for present/absent)
#   weight            — integer score adjustment
#   action            — score (add) | penalty (subtract) | gate (block profile entirely)
#   notes             — optional description
#
# COMMON BUILT-IN SIGNAL KEYS:
#   archetype_<key>            — role scored as this archetype (e.g. archetype_backend)
#   jd_signal_<key>            — JD keywords matched for archetype <key> (e.g. jd_signal_backend)
#   fit_band_direct            — role is a direct fit
#   fit_band_adjacent          — role is an adjacent fit
#   low_match_general_fallback — role matched poorly overall
#   requirement_count_matched  — number of matched requirements
#   requirement_count_unmatched — number of unmatched requirements
#   requirement_match_ratio    — fraction of requirements matched (0.0–1.0)
#
# Replace "general" below with your own archetype keys from profile.yml.
# Add one rule block per archetype (copy/paste the general block and customize).
# Ask your AI agent to generate rules for your archetypes:
#
#   "Read config/profile.yml and config/resume-signal-rules.example.yml.
#    Generate a resume-signal-rules.yml for my archetypes."

rules:
  # ── general (fallback) ───────────────────────────────────────────────────────
  - profile_key: general
    signal_key: fit_band_direct
    operator: gte
    threshold_numeric: 1
    weight: 5
    action: score
    notes: "General remains available on direct fits."

  - profile_key: general
    signal_key: fit_band_adjacent
    operator: gte
    threshold_numeric: 1
    weight: 15
    action: score
    notes: "General is acceptable for adjacent fits."

  - profile_key: general
    signal_key: low_match_general_fallback
    operator: gte
    threshold_numeric: 1
    weight: 60
    action: score
    notes: "General is the low-match fallback."

  - profile_key: general
    signal_key: requirement_match_ratio
    operator: lte
    threshold_numeric: 0.34
    weight: 20
    action: score
    notes: "Bias general when matched requirement density is low."
